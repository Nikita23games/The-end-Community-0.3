<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival - Stacks & Split</title>
    <style>
        :root {
            --panel-bg: rgba(15, 15, 15, 0.98);
            --accent: #f59e0b;
            --slot-bg: #1f2937;
            --slot-border: #374151;
            --slot-selected: #3b82f6;
        }

        * { box-sizing: border-box; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; cursor: crosshair; }

        canvas { display: block; }

        /* UI Bottom */
        #ui-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 15px;
            z-index: 100;
        }

        #hotbar {
            display: flex;
            gap: 8px;
            background: var(--panel-bg);
            padding: 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .slot {
            width: 60px;
            height: 60px;
            background: var(--slot-bg);
            border: 2px solid var(--slot-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .slot.selected {
            border-color: var(--slot-selected);
            background: rgba(59, 130, 246, 0.1);
            transform: scale(1.05);
        }

        .count-tag {
            position: absolute;
            bottom: 2px;
            right: 5px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
        }

        #btn-inv {
            background: var(--accent);
            border: none;
            width: 65px;
            height: 65px;
            border-radius: 18px;
            font-size: 32px;
            cursor: pointer;
            box-shadow: 0 6px 0 #b45309;
        }
        #btn-inv:active { transform: translateY(4px); box-shadow: 0 2px 0 #b45309; }

        /* Inventory Overlay */
        #inv-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            backdrop-filter: blur(8px);
        }

        .inv-window {
            background: #111;
            border: 2px solid #333;
            border-radius: 24px;
            padding: 25px;
            width: 480px;
        }

        .grid-3x3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .craft-area { display: flex; align-items: center; justify-content: space-around; margin-bottom: 20px; background: #1a1a1a; padding: 15px; border-radius: 15px; }
        .res-slot { width: 80px; height: 80px; border: 3px dashed #444; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .res-slot.active { border-color: #10b981; background: rgba(16,185,129,0.1); cursor: pointer; }
        
        .main-inv-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }

        .hint {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #777;
            font-size: 13px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="hint">
        WASD - Ходить<br>
        ЛКМ - Удар<br>
        E - Инвентарь<br>
        ПКМ в инвентаре - Положить 1 шт.
    </div>

    <div id="ui-container">
        <div id="hotbar">
            <div class="slot hb-slot" data-idx="0"></div>
            <div class="slot hb-slot" data-idx="1"></div>
            <div class="slot hb-slot" data-idx="2"></div>
            <div class="slot hb-slot" data-idx="3"></div>
            <div class="slot hb-slot" data-idx="4"></div>
            <div class="slot hb-slot" data-idx="5"></div>
        </div>
        <button id="btn-inv">🎒</button>
    </div>

    <div id="inv-overlay">
        <div class="inv-window">
            <div class="craft-area">
                <div class="grid-3x3">
                    <div class="slot c-slot" data-cidx="0"></div>
                    <div class="slot c-slot" data-cidx="1"></div>
                    <div class="slot c-slot" data-cidx="2"></div>
                    <div class="slot c-slot" data-cidx="3"></div>
                    <div class="slot c-slot" data-cidx="4"></div>
                    <div class="slot c-slot" data-cidx="5"></div>
                    <div class="slot c-slot" data-cidx="6"></div>
                    <div class="slot c-slot" data-cidx="7"></div>
                    <div class="slot c-slot" data-cidx="8"></div>
                </div>
                <div style="font-size: 30px; color: #555;">➔</div>
                <div id="c-res" class="res-slot"></div>
            </div>
            <div class="main-inv-grid" id="main-inv"></div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const WORLD_SIZE = 3000;
    const MAX_STACK = 64;

    // Состояние: предметы теперь объекты { type, icon, count }
    let inventory = JSON.parse(localStorage.getItem('surv_inv_v2')) || new Array(18).fill(null);
    let craftGrid = new Array(9).fill(null);
    let selectedSlot = null; // { type: 'inv'|'craft', index }

    const player = { x: 1500, y: 1500, r: 22, angle: 0, speed: 6, isPunching: false, punchF: 0 };
    const keys = { w:0, a:0, s:0, d:0 };
    const mouse = { x: 0, y: 0 };
    const camera = { x: 0, y: 0 };
    let shake = 0;
    const worldObjects = [];

    function init() {
        for(let i=0; i<100; i++) {
            const type = Math.random() > 0.4 ? 'tree' : 'rock';
            worldObjects.push({
                x: Math.random()*(WORLD_SIZE-200)+100,
                y: Math.random()*(WORLD_SIZE-200)+100,
                type, r: type === 'tree' ? 26 : 22
            });
        }
        resize();
        updateUI();
        requestAnimationFrame(gameLoop);
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function save() {
        localStorage.setItem('surv_inv_v2', JSON.stringify(inventory));
    }

    // Добавление предмета с учетом стаков
    function addItem(type, icon) {
        // Ищем существующий неполный стак
        let stack = inventory.find(i => i && i.type === type && i.count < MAX_STACK);
        if (stack) {
            stack.count++;
        } else {
            // Ищем пустое место
            let emptyIdx = inventory.findIndex(i => i === null);
            if (emptyIdx !== -1) {
                inventory[emptyIdx] = { type, icon, count: 1 };
            }
        }
    }

    window.addEventListener('keydown', e => { 
        if(e.key.toLowerCase() === 'e') toggleInv();
        if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = 1;
    });
    window.addEventListener('keyup', e => {
        if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = 0;
    });
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    window.addEventListener('mousedown', e => {
        if (document.getElementById('inv-overlay').style.display === 'flex') return;
        if (e.button === 0) performPunch();
    });

    function performPunch() {
        if (player.isPunching) return;
        player.isPunching = true;
        player.punchF = 0;

        worldObjects.forEach(obj => {
            if (Math.hypot(player.x - obj.x, player.y - obj.y) < player.r + obj.r + 50) {
                shake = 15;
                if (obj.type === 'tree') addItem('log', '🪵');
                else addItem('stone', '🪨');
                updateUI();
                save();
            }
        });
    }

    function updateUI() {
        const invEl = document.getElementById('main-inv');
        invEl.innerHTML = '';
        inventory.forEach((item, i) => {
            const div = createSlotElement(item, i, 'inv');
            invEl.appendChild(div);
        });

        const hbSlots = document.querySelectorAll('.hb-slot');
        hbSlots.forEach((slot, i) => {
            const item = inventory[i];
            slot.innerHTML = item ? `${item.icon}<div class="count-tag">${item.count > 1 ? item.count : ''}</div>` : '';
        });

        const cSlots = document.querySelectorAll('.c-slot');
        cSlots.forEach((slot, i) => {
            const item = craftGrid[i];
            slot.innerHTML = item ? `${item.icon}<div class="count-tag">${item.count > 1 ? item.count : ''}</div>` : '';
            slot.className = `slot c-slot ${selectedSlot?.type === 'craft' && selectedSlot.index === i ? 'selected' : ''}`;
            slot.onclick = (e) => handleSlotAction(e, 'craft', i);
            slot.oncontextmenu = (e) => handleSlotAction(e, 'craft', i);
        });

        checkCraft();
    }

    function createSlotElement(item, index, type) {
        const div = document.createElement('div');
        div.className = `slot ${selectedSlot?.type === type && selectedSlot.index === index ? 'selected' : ''}`;
        div.innerHTML = item ? `${item.icon}<div class="count-tag">${item.count > 1 ? item.count : ''}</div>` : '';
        div.onclick = (e) => handleSlotAction(e, type, index);
        div.oncontextmenu = (e) => handleSlotAction(e, type, index);
        return div;
    }

    function handleSlotAction(e, type, index) {
        e.preventDefault();
        const list = type === 'inv' ? inventory : craftGrid;
        const isRightClick = e.button === 2;

        if (!selectedSlot) {
            // Если ничего не выбрано - берем предмет
            if (list[index]) {
                selectedSlot = { type, index };
            }
        } else {
            // Если предмет уже в руках
            const sourceList = selectedSlot.type === 'inv' ? inventory : craftGrid;
            const sourceItem = sourceList[selectedSlot.index];

            if (isRightClick) {
                // ПРАВАЯ КНОПКА - Положить 1 шт
                if (!list[index]) {
                    // В пустой слот
                    list[index] = { ...sourceItem, count: 1 };
                    sourceItem.count--;
                } else if (list[index].type === sourceItem.type && list[index].count < MAX_STACK) {
                    // В такой же стак
                    list[index].count++;
                    sourceItem.count--;
                }

                if (sourceItem.count <= 0) {
                    sourceList[selectedSlot.index] = null;
                    selectedSlot = null;
                }
            } else {
                // ЛЕВАЯ КНОПКА - Свап или Стак
                if (list[index] && list[index].type === sourceItem.type && list[index].count < MAX_STACK) {
                    // Стакаем
                    let space = MAX_STACK - list[index].count;
                    let toAdd = Math.min(space, sourceItem.count);
                    list[index].count += toAdd;
                    sourceItem.count -= toAdd;
                    if (sourceItem.count <= 0) {
                        sourceList[selectedSlot.index] = null;
                        selectedSlot = null;
                    }
                } else {
                    // Свапаем
                    const temp = list[index];
                    list[index] = sourceList[selectedSlot.index];
                    sourceList[selectedSlot.index] = temp;
                    selectedSlot = null;
                }
            }
            save();
        }
        updateUI();
    }

    function checkCraft() {
        const resEl = document.getElementById('c-res');
        resEl.innerHTML = ''; resEl.classList.remove('active');
        
        const logs = craftGrid.filter(i => i?.type === 'log').reduce((sum, i) => sum + i.count, 0);
        let result = null;

        if (logs >= 4) result = { type: 'bench', icon: '🛠️', count: 1 };
        else if (logs >= 1) result = { type: 'planks', icon: '📦', count: 4 };

        if (result) {
            resEl.innerHTML = result.icon;
            resEl.classList.add('active');
            resEl.onclick = () => {
                let idx = inventory.findIndex(i => i === null);
                if (idx !== -1) {
                    inventory[idx] = result;
                    craftGrid.fill(null);
                    save(); updateUI();
                }
            };
        }
    }

    function toggleInv() {
        const o = document.getElementById('inv-overlay');
        o.style.display = o.style.display === 'flex' ? 'none' : 'flex';
        selectedSlot = null;
        updateUI();
    }

    document.getElementById('btn-inv').onclick = toggleInv;

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        if (document.getElementById('inv-overlay').style.display === 'flex') return;

        let mx = keys.d - keys.a;
        let my = keys.s - keys.w;
        if (mx !== 0 || my !== 0) {
            let mag = Math.hypot(mx, my);
            let nx = player.x + (mx/mag)*player.speed;
            let ny = player.y + (my/mag)*player.speed;
            
            let cx = nx > 0 && nx < WORLD_SIZE;
            let cy = ny > 0 && ny < WORLD_SIZE;

            worldObjects.forEach(o => {
                if (Math.hypot(nx - o.x, player.y - o.y) < player.r + o.r) cx = false;
                if (Math.hypot(player.x - o.x, ny - o.y) < player.r + o.r) cy = false;
            });

            if(cx) player.x = nx;
            if(cy) player.y = ny;
        }

        player.angle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);

        if (player.isPunching) {
            player.punchF += 0.25;
            if (player.punchF >= Math.PI) { player.isPunching = false; player.punchF = 0; }
        }

        camera.x = player.x - canvas.width/2;
        camera.y = player.y - canvas.height/2;
        shake *= 0.9;
    }

    function draw() {
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-camera.x + (Math.random()-0.5)*shake, -camera.y + (Math.random()-0.5)*shake);

        ctx.fillStyle = '#2d4c2d';
        ctx.fillRect(0,0, WORLD_SIZE, WORLD_SIZE);

        const list = [...worldObjects, { ...player, isPlayer: true }].sort((a,b) => a.y - b.y);
        list.forEach(o => {
            if (o.isPlayer) {
                ctx.save();
                ctx.translate(o.x, o.y); ctx.rotate(o.angle);
                ctx.fillStyle = '#ffdbac';
                let p = o.isPunching ? Math.sin(o.punchF)*25 : 0;
                ctx.beginPath(); ctx.arc(20+p, -18, 10, 0, 7); ctx.fill();
                ctx.beginPath(); ctx.arc(20+p, 18, 10, 0, 7); ctx.fill();
                ctx.beginPath(); ctx.arc(0, 0, o.r, 0, 7); ctx.fill();
                ctx.strokeStyle = '#000'; ctx.stroke();
                ctx.restore();
            } else {
                if (o.type === 'tree') {
                    ctx.fillStyle = '#3e2723'; ctx.fillRect(o.x-14, o.y-5, 28, 40);
                    ctx.fillStyle = '#1b5e20'; ctx.beginPath(); ctx.arc(o.x, o.y-50, 80, 0, 7); ctx.fill();
                } else {
                    ctx.fillStyle = '#616161'; ctx.beginPath();
                    ctx.moveTo(o.x-25, o.y+15); ctx.lineTo(o.x, o.y-25); ctx.lineTo(o.x+25, o.y+15); ctx.fill();
                }
            }
        });
        ctx.restore();
    }

    window.addEventListener('resize', resize);
    init();
</script>
</body>
</html>
